name: Release

# Ships a release on every push to main, gated by the version in Info.plist:
# if no release exists yet for the current CFBundleShortVersionString, build and
# publish it. So the flow is: bump the version → merge to main → release is
# published automatically → existing users auto-update (UpdateService).
#
# Commits that don't bump the version don't republish, so a docs/readme commit
# won't push an identical update to every user. To force a release on a given
# commit, bump CFBundleShortVersionString in Ortus/Info.plist.

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  release:
    # macos-15 ships Xcode 16 / Swift 6, which Package.swift requires
    # (swift-tools-version 6.0). macos-14 defaults to Swift 5.10 and can't build it.
    runs-on: macos-15
    steps:
      - uses: actions/checkout@v4

      - name: Select Xcode 16 (Swift 6 toolchain)
        run: |
          # macos-15 already defaults to Xcode 16, but select the newest installed
          # Xcode 16.x explicitly rather than hardcode a minor-version bundle name.
          XCODE=$(ls -d /Applications/Xcode_16*.app 2>/dev/null | sort -V | tail -1)
          if [ -n "$XCODE" ]; then sudo xcode-select -s "$XCODE"; fi
          swift --version

      - name: Read version from Info.plist
        id: ver
        run: |
          V=$(/usr/libexec/PlistBuddy -c "Print :CFBundleShortVersionString" Ortus/Info.plist)
          echo "version=$V" >> "$GITHUB_OUTPUT"
          echo "Version: $V"

      - name: Check whether this version is already released
        id: check
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          if gh release view "v${{ steps.ver.outputs.version }}" >/dev/null 2>&1; then
            echo "exists=true" >> "$GITHUB_OUTPUT"
            echo "Release v${{ steps.ver.outputs.version }} already exists — skipping."
          else
            echo "exists=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Build release (ad-hoc signed)
        if: steps.check.outputs.exists == 'false'
        run: ORTUS_SIGNING_IDENTITY=- ./build.sh release

      - name: Publish GitHub release
        if: steps.check.outputs.exists == 'false'
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh release create "v${{ steps.ver.outputs.version }}" \
            Ortus-macOS.zip \
            --title "Ortus ${{ steps.ver.outputs.version }}" \
            --generate-notes
